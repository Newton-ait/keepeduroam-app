name: EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        default: 'android'
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Restore Firebase configs from secrets
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json
          fi
          if [ -n "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d > GoogleService-Info.plist
          fi

      - name: Debug - call @expo/config directly for full stack trace
        run: |
          set +e
          node -e "
            try {
              const { getConfig } = require('@expo/config');
              const result = getConfig(process.cwd(), { skipSDKVersionRequirement: true, isPublicConfig: true });
              console.log('SUCCESS');
              console.log(JSON.stringify(result.exp, null, 2).slice(0, 2000));
            } catch (e) {
              console.error('CONFIG LOAD FAILED:');
              console.error(e && e.stack ? e.stack : e);
            }
          " > expo-config-direct.log 2>&1
          echo "----- direct @expo/config output -----"
          cat expo-config-direct.log
          echo "----------------------------------------"

      - name: Build on EAS
        run: |
          set +e
          eas build --platform ${{ github.event.inputs.platform || 'android' }} --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive > eas-build-output.log 2>&1
          code=$?
          echo "----- eas build output -----"
          cat eas-build-output.log
          echo "-----------------------------"
          exit $code